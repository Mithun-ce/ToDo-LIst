{% load static %}
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>My Todo List</title>
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
  <div class="container">
    <h1>My Todo List</h1>
    <a href="{% url 'task_create' %}" class="add-btn">+ Add Task</a>
    <a href="{% url 'task_history' %}" class="back-link">View History →</a>
    <ul>
      {% for task in tasks %}
        <li class="task-card">
          <span class="task-title {% if task.completed %}completed{% endif %}">
            {{ task.title }}
          </span>
          <span class="task-actions">
            <a href="{% url 'task_toggle' task.id %}" class="toggle-btn">Toggle</a>
            <a href="{% url 'task_delete' task.id %}" class="delete-btn">Delete</a>
          </span>
        </li>
      {% empty %}
        <li class="empty-state">No tasks yet. Add one above!</li>
      {% endfor %}
    </ul>
  </div>
</body>
</html>
