{% load static %}
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Add a Task</title>
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
  <div class="container">
    <h1>Add a Task</h1>
    <form method="POST">
      {% csrf_token %}
      <input type="text" name="title" placeholder="What needs to be done?" required autofocus>
      <button type="submit">Add Task</button>
    </form>
    <a href="{% url 'task_list' %}" class="back-link">← Back to list</a>
  </div>
</body>
</html>
